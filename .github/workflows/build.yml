name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Linux GUI dependencies for Fyne
        run: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true
      - name: Download dependencies
        run: go mod download
      - name: Run unit tests
        run: go test -v ./...

  build-windows:
    name: Build Windows Desktop EXE
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true
      - name: Download dependencies
        run: go mod download
      - name: Build Windows executable (.exe) with Native GUI
        env:
          CGO_ENABLED: 1
          GOOS: windows
          GOARCH: amd64
        run: go build -ldflags="-s -w -H=windowsgui" -o dist/ping-monitor-windows-amd64.exe .
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ping-monitor-binaries-win
          path: dist/
          retention-days: 30

  build-linux:
    name: Build Linux Desktop Executable
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Linux GUI dependencies for Fyne
        run: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true
      - name: Download dependencies
        run: go mod download
      - name: Build Linux executable
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: amd64
        run: go build -ldflags="-s -w" -o dist/ping-monitor-linux-amd64 .
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ping-monitor-binaries-linux
          path: dist/
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: [test, build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
