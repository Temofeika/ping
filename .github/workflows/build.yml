name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test -v ./...

      - name: Build Windows executable (.exe)
        env:
          CGO_ENABLED: 0
          GOOS: windows
          GOARCH: amd64
        run: go build -ldflags="-s -w" -o dist/ping-monitor-windows-amd64.exe .

      - name: Build Linux executable
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: amd64
        run: go build -ldflags="-s -w" -o dist/ping-monitor-linux-amd64 .

      - name: Build macOS executable (Apple Silicon)
        env:
          CGO_ENABLED: 0
          GOOS: darwin
          GOARCH: arm64
        run: go build -ldflags="-s -w" -o dist/ping-monitor-darwin-arm64 .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ping-monitor-binaries
          path: dist/
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ping-monitor-binaries
          path: dist/

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
